name: Deploy com chave segura

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Injetar API Key no HTML
        run: |
          sed -i "s/PLACEHOLDER_GROQ_KEY/${{ secrets.GROQ_API_KEY }}/g" index.html

      - name: Publicar no GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
